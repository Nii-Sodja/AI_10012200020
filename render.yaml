services:
  - type: web
    name: govintel-ai
    env: python
    buildCommand: pip install -r requirements.txt && python build_index.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.fileWatcherType none --logger.level error
    envVars:
      - key: GROQ_API_KEY
        sync: false
